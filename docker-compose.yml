services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      LLM_MODE: ${LLM_MODE:-mock}
      SPARK_APP_ID: ${SPARK_APP_ID:-}
      SPARK_API_KEY: ${SPARK_API_KEY:-}
      SPARK_API_SECRET: ${SPARK_API_SECRET:-}
      SPARK_API_URL: ${SPARK_API_URL:-}
      CHROMA_PERSIST_DIR: /app/chroma_db
      KNOWLEDGE_BASE_DIR: /app/knowledge_base
    volumes:
      - chroma_data:/app/chroma_db
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  chroma_data:
